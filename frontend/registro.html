<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registro — Refugio de Perros</title>
<link rel="stylesheet" href="login.css" />
</head>
<body>

<div class="contenedor-login">
<div class="tarjeta-login">

<div class="encabezado-marca">
<div class="icono-marca">
<svg viewBox="0 0 24 24">
<rect x="3" y="3" width="18" height="18" rx="3"/>
<line x1="8" y1="8" x2="16" y2="8"/>
<circle cx="12" cy="13" r="3"/>
<line x1="7" y1="19" x2="17" y2="19"/>
</svg>
</div>
<h1 class="titulo-marca">Refugio de Perros</h1>
<span class="subtitulo-marca">Sistema de Gestión</span>
</div>

<h2>Registrarse</h2>

<div class="grupo-campo">
<label class="etiqueta">Cédula</label>
<input class="campo-texto" type="text" placeholder="Ingrese su cédula" />
</div>

<div class="grupo-campo">
<label class="etiqueta">Nombre Completo</label>
<input class="campo-texto" type="text" placeholder="Ingrese su nombre completo" />
</div>

<div class="grupo-campo">
<label class="etiqueta">Contraseña</label>
<input class="campo-contrasena" type="password" placeholder="Cree una contraseña" />
</div>

<div class="grupo-campo">
<label class="etiqueta">Confirmar Contraseña</label>
<input class="campo-contrasena" type="password" placeholder="Repita la contraseña" />
</div>

<div class="fila-botones">
<a class="boton boton-primario" href="login.html">
Crear Cuenta
</a>

<a class="boton boton-secundario" href="login.html">
Volver a Iniciar Sesión
</a>
</div>

</div>
</div>

</body>
</html>
