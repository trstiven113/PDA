<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin View — Refugio de Perros</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <div class="contenedor-pagina">

    <!-- Encabezado -->
    <div class="encabezado-pagina">
      <div class="icono-encabezado">
        <svg viewBox="0 0 24 24">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="12" y2="16"/>
          <circle cx="17" cy="17" r="3"/>
        </svg>
      </div>
      <div class="texto-encabezado">
        <h1>Admin View</h1>
        <p>Gestión y registro de perros en el refugio</p>
      </div>
    </div>

    <!-- Formulario -->
    <div class="tarjeta-formulario">
      <div class="cuadricula-formulario">

        <div class="grupo-campo">
          <label class="etiqueta" for="nombre">Nombre</label>
          <input class="campo-texto" type="text" id="nombre" name="nombre" placeholder="Nombre del perro" />
        </div>

        <div class="grupo-campo">
          <label class="etiqueta" for="estado-salud">Estado de Salud</label>
          <select class="campo-seleccion" id="estado-salud" name="estado-salud">
            <option value="SANO">SANO</option>
            <option value="ENFERMO">ENFERMO</option>
            <option value="RECUPERACION">EN RECUPERACIÓN</option>
          </select>
        </div>

        <div class="grupo-campo">
          <label class="etiqueta" for="raza">Raza</label>
          <input class="campo-texto" type="text" id="raza" name="raza" placeholder="Raza del perro" />
        </div>

        <div class="grupo-campo">
          <label class="etiqueta" for="temperamento">Temperamento</label>
          <select class="campo-seleccion" id="temperamento" name="temperamento">
            <option value="AMIGABLE">AMIGABLE</option>
            <option value="AGRESIVO">AGRESIVO</option>
            <option value="TIMIDO">TÍMIDO</option>
            <option value="JUGUETON">JUGUETÓN</option>
          </select>
        </div>

        <div class="grupo-campo">
          <label class="etiqueta" for="edad">Edad (años)</label>
          <input class="campo-numero" type="number" id="edad" name="edad" value="0" min="0" max="30" />
        </div>

        <div class="grupo-campo">
          <label class="etiqueta" for="peso">Peso (kg)</label>
          <input class="campo-texto" type="text" id="peso" name="peso" placeholder="Ej: 25.5" />
        </div>

        <div class="grupo-campo">
          <label class="etiqueta" for="sexo">Sexo</label>
          <select class="campo-seleccion" id="sexo" name="sexo">
            <option value="MACHO">MACHO</option>
            <option value="HEMBRA">HEMBRA</option>
          </select>
        </div>

      </div>

      <!-- Botones -->
      <div class="barra-acciones">

        <a class="boton boton-azul" href="#">
          <svg class="boton-icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="16" y1="11" x2="22" y2="11"/>
          </svg>
          Agregar Perro
        </a>

        <a class="boton boton-amarillo" href="refugio.html">
          <svg class="boton-icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          Ver Perro
        </a>

        <a class="boton boton-gris" href="login.html">
          <svg class="boton-icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Volver
        </a>

      </div>
    </div>

    <!-- Tabla -->
    <div class="tarjeta-tabla">
      <div class="encabezado-tabla">
        <span class="titulo-tabla">Registro de Perros</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Raza</th>
            <th>Edad</th>
            <th>Peso</th>
            <th>Sexo</th>
            <th>Estado de Salud</th>
            <th>Temperamento</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="7">
              <div class="estado-vacio">
                <span class="estado-vacio-icono">📋</span>
                No hay perros registrados todavía.
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

</body>
</html>
